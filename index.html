<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel AR - Model Viewer</title>
    
    <!-- Cargamos el componente model-viewer de Google (Estándar de la industria) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        model-viewer {
            width: 100%; height: 100%; background-color: #050505;
            --poster-color: transparent;
        }

        /* UI de la Casa Abierta */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            padding: 30px 0;
        }
        .header-title { color: #00ffcc; font-size: 1.2rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .header-subtitle { color: #fff; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8; margin-top: 5px; }

        /* Botón AR Personalizado */
        #ar-button {
            background-color: #00ffcc; border-radius: 50px; border: none;
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 18px 40px; font-weight: 900; color: #000; font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4); cursor: pointer;
            display: flex; align-items: center; gap: 10px; pointer-events: auto;
            text-transform: uppercase;
        }

        /* Indicador de Carga */
        .progress-bar {
            position: absolute; width: 100%; height: 2px; top: 0; left: 0;
            background: rgba(255,255,255,0.1); display: none;
        }
        .update-bar { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: width 0.3s; }

        /* Instrucciones al entrar */
        #instructions {
            position: absolute; bottom: 120px; width: 100%; text-align: center;
            color: #fff; font-size: 0.8rem; opacity: 0.7; letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <!-- Capa de Información -->
    <div class="overlay">
        <h1 class="header-title">Cyber Sentinel</h1>
        <div class="header-subtitle">CASA ABIERTA UIDE 2026</div>
    </div>

    <!-- El Visor 3D y AR de Google -->
    <!-- ar: activa el modo AR -->
    <!-- ar-modes: prioriza los métodos nativos (más estables) -->
    <!-- camera-controls: permite rotar/zoom con los dedos -->
    <!-- shadow-intensity: proyecta sombra real en tu suelo -->
    <model-viewer 
        id="cyber-sentinel"
        src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"
        ar
        ar-modes="scene-viewer quick-look webxr"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="2"
        shadow-softness="1"
        exposure="1"
        auto-rotate
        rotation="0 0 0"
        interaction-prompt="auto">
        
        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">
            🚀 ACTIVAR REALIDAD AUMENTADA
        </button>

        <div id="instructions">
            Usa tus dedos para rotar y hacer zoom al modelo
        </div>

        <div id="ar-prompt" style="display: none;">
            <img src="https://modelviewer.dev/assets/hand.png">
        </div>
    </model-viewer>

    <script>
        // Manejo de la barra de progreso de carga
        const modelViewer = document.querySelector('#cyber-sentinel');
        const progressBar = document.querySelector('.progress-bar');
        const updateBar = document.querySelector('.update-bar');

        modelViewer.addEventListener('progress', (event) => {
            const { totalProgress } = event.detail;
            progressBar.style.display = 'block';
            updateBar.style.width = `${totalProgress * 100}%`;
            if (totalProgress === 1) {
                setTimeout(() => progressBar.style.display = 'none', 500);
            }
        });

        // Error al cargar
        modelViewer.addEventListener('error', (event) => {
            console.error('Error al cargar el modelo:', event.detail);
            alert("No se pudo cargar el modelo 3D. Verifica tu conexión.");
        });
    </script>
</body>
</html>
