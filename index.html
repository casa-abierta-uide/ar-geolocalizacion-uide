<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - Comunidad WebAR</title>
    
    <!-- Librerías de la Comunidad: A-Frame + AR.js + Gesture Controls -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/gesture-handler.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* UI de la Casa Abierta */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .info-panel {
            background: rgba(0, 255, 204, 0.1); border-bottom: 2px solid #00ffcc;
            color: #00ffcc; padding: 15px; text-align: center; font-family: monospace;
            backdrop-filter: blur(5px); pointer-events: auto;
        }
        .controls-hint {
            color: white; text-align: center; padding: 20px; font-family: sans-serif;
            font-size: 0.8rem; background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        
        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            justify-content: center; align-items: center; z-index: 2000;
            font-family: monospace; letter-spacing: 3px;
        }
    </style>
</head>

<body>
    <div id="loader">CARGANDO CYBER SENTINEL...</div>

    <div id="ui-overlay">
        <div class="info-panel">
            <div style="font-weight: bold; font-size: 1.2rem;">UIDE AR PROJECT</div>
            <div style="font-size: 0.7rem; opacity: 0.8;">CASA ABIERTA 2026</div>
        </div>
        <div class="controls-hint">
            Usa un dedo para rotar • Dos dedos para escalar<br>
            <span style="color: #00ffcc;">El robot está frente a ti</span>
        </div>
    </div>

    <!-- Escena AR integrada en el navegador -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        gesture-detector
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- El modelo aparece frente a la cámara inicial (0 0 -5) -->
        <!-- class="clickable" y gesture-handler permiten el control táctil -->
        <a-entity
            id="sentinel-entity"
            gltf-model="#cyber-model"
            position="0 0 -8"
            scale="1 1 1"
            class="clickable"
            gesture-handler="minScale: 0.25; maxScale: 10"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        </a-entity>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 2 1" intensity="1"></a-light>

        <!-- Cámara de AR.js -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const loader = document.getElementById('loader');
        const sentinel = document.getElementById('sentinel-entity');

        // Quitar loader cuando el modelo 3D esté listo
        sentinel.addEventListener('model-loaded', () => {
            setTimeout(() => {
                loader.style.display = 'none';
            }, 1000);
        });

        // Error handling
        window.onerror = (m) => {
            document.getElementById('loader').innerText = "ERROR: " + m;
        };
    </script>
</body>
</html>
