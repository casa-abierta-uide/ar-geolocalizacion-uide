<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - Surface AR</title>
    <!-- Usamos la última versión de A-Frame para mejor soporte WebXR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #instructions {
            position: fixed; top: 20px; left: 0; width: 100%; text-align: center;
            color: #00ffcc; z-index: 100; pointer-events: none; text-shadow: 0 0 10px #000;
        }
        .btn-ar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #00ffcc; border: none; border-radius: 50px;
            font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,255,204,0.4);
            z-index: 1000; display: none;
        }
    </style>
</head>

<body>
    <div id="instructions">Busca una superficie plana (suelo o mesa)</div>
    
    <!-- Botón para iniciar AR (Requerido por navegadores móviles) -->
    <button id="start-ar" class="btn-ar">INICIAR EXPERIENCIA</button>

    <a-scene 
        webxr="optionalFeatures: hit-test; overlayElement: #instructions;" 
        ar-hit-test="target: #model-container; type: footprint;"
        renderer="logarithmicDepthBuffer: true;"
        embedded>
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- Contenedor del modelo (se moverá a donde el usuario toque) -->
        <a-entity id="model-container" position="0 0 -5" visible="false">
            <a-entity 
                gltf-model="#cyber-model" 
                scale="1 1 1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-entity>
            <a-text 
                value="SENTINEL" 
                position="0 2.2 0" 
                align="center" 
                color="#00ffcc"
                scale="1.5 1.5 1.5">
            </a-text>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>

        <!-- Luz ambiental para que el modelo se vea bien -->
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="1 1 1" intensity="1"></a-light>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const container = document.querySelector('#model-container');
        const instructions = document.querySelector('#instructions');
        const startBtn = document.querySelector('#start-ar');

        // Mostrar botón cuando la escena esté lista
        scene.addEventListener('loaded', () => {
            startBtn.style.display = 'block';
        });

        startBtn.addEventListener('click', () => {
            scene.enterAR();
            startBtn.style.display = 'none';
            instructions.innerHTML = "Mueve el móvil para detectar el suelo...";
        });

        // Evento de Hit-Test: Cuando se detecta una superficie y el usuario toca
        scene.addEventListener('ar-hit-test-select', () => {
            container.setAttribute('visible', 'true');
            instructions.innerHTML = "¡Modelo Fijado!";
            setTimeout(() => { instructions.style.display = 'none'; }, 2000);
        });
    </script>
</body>
</html>
