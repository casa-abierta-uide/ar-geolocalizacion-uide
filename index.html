<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - Hand AR</title>
    <!-- Librerías de MediaPipe y Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #output_canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: cover; }
        #video_input { display: none; }
        #ui-layer {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: #00ffcc; font-family: sans-serif; z-index: 10;
            text-shadow: 0 0 10px #000; font-weight: bold;
        }
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>

<body>
    <div id="ui-layer">Muestra la palma de tu mano</div>
    <div id="loader" class="loader">Cargando IA de Mano...</div>
    
    <video id="video_input" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video_input');
        const canvasElement = document.getElementById('output_canvas');
        const loader = document.getElementById('loader');

        // --- Configuración de Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(light);

        let model;
        const loader3d = new THREE.GLTFLoader();
        loader3d.load('Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb', (gltf) => {
            model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.visible = false;
            scene.add(model);
            loader.style.display = 'none';
        });

        camera.position.z = 5;

        // --- Configuración de MediaPipe Hands ---
        const hands = new Hands({
            locateFile: (file) => https://cdn.jsdelivr.net/npm/@mediapipe/hands/
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && model) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Usamos el punto 9 (centro de la palma) para posicionar
                const palmCenter = landmarks[9];
                
                // Convertir coordenadas de MediaPipe (0-1) a Three.js (-x a x)
                const x = (palmCenter.x - 0.5) * 10;
                const y = -(palmCenter.y - 0.5) * 10;
                const z = -palmCenter.z * 10;

                model.position.set(x, y, z);
                model.rotation.y += 0.05;
                model.visible = true;
            } else if (model) {
                model.visible = false;
            }
            renderer.render(scene, camera);
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        cameraUtils.start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
