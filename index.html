<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - Surface AR (Optimized)</title>
    <!-- Usamos A-Frame 1.4.2 para soporte WebXR nativo en móviles -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #instructions {
            position: fixed; top: 20px; left: 0; width: 100%; text-align: center;
            color: #00ffcc; z-index: 100; pointer-events: none;
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px #000;
        }

        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        
        .progress-bar-bg { width: 70%; height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 15px; }
        #progress-fill { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: width 0.3s; }

        .btn-ar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; background: #00ffcc; border: none; border-radius: 50px;
            color: #000; font-weight: bold; font-size: 1rem;
            box-shadow: 0 5px 20px rgba(0,255,204,0.5); z-index: 1001;
            display: none; cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="loader" class="loader-container">
        <div style="font-weight: bold;">CYBER SENTINEL AR</div>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <div id="status-text" style="margin-top:10px; font-size: 10px;">CARGANDO MODELO...</div>
    </div>

    <div id="instructions">Busca una superficie plana</div>
    <button id="start-ar" class="btn-ar">INICIAR AR</button>

    <a-scene 
        webxr="optionalFeatures: hit-test, dom-overlay; overlayElement: #instructions;" 
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        ar-hit-test="target: #reticle; type: footprint;"
        embedded>
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- RETÍCULA (Guía visual para el suelo) -->
        <a-entity id="reticle" visible="false">
            <a-ring color="#00ffcc" radius-inner="0.15" radius-outer="0.2" rotation="-90 0 0"></a-ring>
            <a-light type="point" intensity="0.5" color="#00ffcc"></a-light>
        </a-entity>

        <!-- CONTENEDOR DEL MODELO (Aparecerá donde el usuario toque) -->
        <a-entity id="model-placed" position="0 0 -5" visible="false">
            <a-entity 
                gltf-model="#cyber-model" 
                scale="0.8 0.8 0.8"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
            </a-entity>
            <a-text 
                value="CYBER SENTINEL" 
                position="0 2 0" 
                align="center" 
                color="#00ffcc"
                width="4">
            </a-text>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>

        <!-- Iluminación Pro -->
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const loader = document.getElementById('loader');
        const startBtn = document.getElementById('start-ar');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const reticle = document.querySelector('#reticle');
        const modelPlaced = document.querySelector('#model-placed');
        const instructions = document.getElementById('instructions');

        // Seguimiento de carga del modelo
        const manager = new THREE.LoadingManager();
        manager.onProgress = (u, l, t) => {
            const p = (l/t) * 100;
            progressFill.style.width = p + '%';
            statusText.innerText = `MODELO: ${Math.round(p)}%`;
        };
        manager.onLoad = () => {
            loader.style.display = 'none';
            startBtn.style.display = 'block';
        };

        // Reemplazar el cargador de A-Frame por el nuestro con manager
        scene.addEventListener('loaded', () => {
            const loader3d = new THREE.GLTFLoader(manager);
            const asset = document.getElementById('cyber-model').src;
        });

        startBtn.addEventListener('click', () => {
            scene.enterAR();
            startBtn.style.display = 'none';
            instructions.innerText = "Mueve el móvil para escanear el suelo";
        });

        // Evento de Hit-Test: Cuando el usuario toca la retícula
        scene.addEventListener('ar-hit-test-select', (e) => {
            const pose = e.detail.pose;
            modelPlaced.setAttribute('position', pose.transform.position);
            modelPlaced.setAttribute('visible', 'true');
            reticle.setAttribute('visible', 'false');
            instructions.innerText = "¡Modelo Fijado!";
            setTimeout(() => { instructions.style.display = 'none'; }, 2000);
        });

        // Mostrar retícula solo en AR
        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) {
                reticle.setAttribute('visible', 'true');
            }
        });
    </script>
</body>
</html>
