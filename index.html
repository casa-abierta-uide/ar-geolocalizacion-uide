<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>AR.js Marker Based - Casa Abierta UIDE</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style='margin: 0; overflow: hidden;'>
    <!-- Escena configurada para Marcadores -->
    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- MARCADOR 'HIRO': El estándar de AR.js -->
        <a-marker preset="hiro">
            <!-- El modelo aparecerá sobre el marcador -->
            <a-entity 
                gltf-model="#cyber-model"
                scale="1 1 1"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
            </a-entity>
            
            <a-text 
                value="CYBER SENTINEL UIDE" 
                position="0 1.5 0" 
                align="center" 
                scale="1 1 1" 
                rotation="-90 0 0"
                color="#00ff00">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div style="position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; z-index: 1001;">
        Apunta la cámara al marcador "Hiro"
    </div>
</body>
</html>
