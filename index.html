<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Sentinel AR - Multi-Cam</title>
    <!-- Cargamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #ui-overlay {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000; gap: 15px;
        }

        .btn {
            padding: 15px 30px; border-radius: 50px; border: none;
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase;
        }

        #btn-switch { background: #00ffcc; color: #000; }
        #btn-reset { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #fff; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #1a1a1a;
            border-top: 4px solid #00ffcc; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="status">INICIALIZANDO CYBER SENTINEL...</div>
    </div>

    <div id="ui-overlay">
        <button id="btn-switch" class="btn">Cambiar Cámara 🔄</button>
        <button id="btn-reset" class="btn">Reiniciar Modelo</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; facingMode: environment;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- El modelo se coloca en una posición fija frente a la cámara (Markerless) -->
        <a-entity id="ar-container" position="0 0 -5">
            <a-entity 
                id="sentinel"
                gltf-model="#cyber-model" 
                scale="1 1 1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-entity>
            <a-text 
                value="CYBER SENTINEL" 
                position="0 2.5 0" 
                align="center" 
                color="#00ffcc"
                width="6">
            </a-text>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btnSwitch = document.getElementById('btn-switch');
        const btnReset = document.getElementById('btn-reset');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const sentinel = document.getElementById('sentinel');
        const container = document.getElementById('ar-container');

        let currentFacingMode = 'environment';

        // Ocultar loader cuando el modelo esté listo
        sentinel.addEventListener('model-loaded', () => {
            loader.style.display = 'none';
        });

        // Alternar entre cámara delantera y trasera
        btnSwitch.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            
            // Recargar la página con el nuevo facingMode (AR.js requiere reinicio de stream)
            const url = new URL(window.location.href);
            url.searchParams.set('facingMode', currentFacingMode);
            window.location.href = url.href;
        });

        // Al cargar, leer el facingMode de la URL
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('facingMode');
            if (mode) {
                currentFacingMode = mode;
                document.querySelector('a-scene').setAttribute('arjs', `sourceType: webcam; debugUIEnabled: false; facingMode: ${mode};`);
            }
        });

        // Reiniciar posición del modelo
        btnReset.addEventListener('click', () => {
            container.setAttribute('position', '0 0 -5');
            sentinel.setAttribute('rotation', '0 0 0');
        });
    </script>
</body>
</html>
