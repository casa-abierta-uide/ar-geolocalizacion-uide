<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Sentinel - Surface Tracking Pro</title>
    <!-- A-Frame 1.4.2 con soporte nativo para WebXR Hit-Test -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }

        .status-msg {
            background: rgba(0,0,0,0.6); color: #00ffcc; padding: 15px 25px;
            border-radius: 30px; margin-top: 30px; font-weight: bold;
            font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid #00ffcc; backdrop-filter: blur(5px);
        }

        #btn-start {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 50px; background: #00ffcc; color: #000; border: none;
            border-radius: 15px; font-weight: 900; font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,255,204,0.5); z-index: 2000;
            cursor: pointer; pointer-events: auto; display: none;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
        }
        .progress-bar { width: 60%; height: 2px; background: #222; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s; }
    </style>
</head>

<body>
    <div id="loader">
        <div style="font-weight: bold; letter-spacing: 3px;">UIDE AR SYSTEM</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="loader-text" style="margin-top:10px; font-size: 10px;">CARGANDO MODELO 3D...</div>
    </div>

    <div id="ui-overlay">
        <div id="status" class="status-msg" style="display:none;">Mueve el móvil para detectar el suelo</div>
    </div>

    <button id="btn-start">🚀 INICIAR EXPERIENCIA</button>

    <!-- Escena configurada para Hit-Test (Surface Tracking) -->
    <a-scene 
        webxr="optionalFeatures: hit-test, dom-overlay; overlayElement: #ui-overlay;"
        renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true;"
        ar-hit-test="target: #reticle; type: footprint;"
        embedded>
        
        <a-assets>
            <a-asset-item id="cyber-model" src="Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb"></a-asset-item>
        </a-assets>

        <!-- RETÍCULA: El círculo guía que "camina" por el suelo -->
        <a-entity id="reticle" visible="false">
            <a-ring color="#00ffcc" radius-inner="0.12" radius-outer="0.15" rotation="-90 0 0">
                <a-circle color="#00ffcc" radius="0.03" animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 600"></a-circle>
            </a-ring>
        </a-entity>

        <!-- MODELO: Estará oculto hasta que el usuario toque la retícula -->
        <a-entity id="placed-model" visible="false">
            <a-entity 
                gltf-model="#cyber-model" 
                scale="0.6 0.6 0.6"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.5"></a-light>
        <a-light type="directional" position="2 4 2" intensity="1"></a-light>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const btn = document.getElementById('btn-start');
        const loader = document.getElementById('loader');
        const progressFill = document.getElementById('progress-fill');
        const status = document.getElementById('status');
        const reticle = document.getElementById('reticle');
        const model = document.getElementById('placed-model');

        // Manejo de carga de archivos pesados
        scene.addEventListener('loaded', () => {
            const loadingManager = AFRAME.THREE.DefaultLoadingManager;
            loadingManager.onProgress = (u, l, t) => {
                const p = (l/t) * 100;
                progressFill.style.width = p + '%';
                if(p >= 100) {
                    setTimeout(() => {
                        loader.style.display = 'none';
                        btn.style.display = 'block';
                    }, 500);
                }
            };
        });

        btn.addEventListener('click', () => {
            scene.enterAR();
            btn.style.display = 'none';
            status.style.display = 'block';
        });

        // Evento crítico: Cuando el sistema encuentra el suelo y el usuario TOCA
        scene.addEventListener('ar-hit-test-select', (e) => {
            const pose = e.detail.pose;
            model.setAttribute('position', pose.transform.position);
            model.setAttribute('visible', 'true');
            status.innerText = "¡SISTEMA FIJADO!";
            setTimeout(() => { status.style.opacity = '0'; }, 3000);
        });

        // Actualizar instrucciones dinámicamente
        setInterval(() => {
            if (scene.is('ar-mode')) {
                if (reticle.getAttribute('visible')) {
                    status.innerText = "¡Superficie Detectada! Toca para fijar";
                    status.style.borderColor = "#00ffcc";
                    status.style.color = "#00ffcc";
                } else {
                    status.innerText = "Mueve el móvil para escanear el suelo";
                    status.style.borderColor = "white";
                    status.style.color = "white";
                }
            }
        }, 500);
    </script>
</body>
</html>
