<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - AR Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* El video de la cámara DEBE ser visible al fondo */
        #video_input {
            position: absolute; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1; transform: scaleX(-1); /* Espejo para frontal */
        }
        
        /* El canvas de Three.js encima del video y transparente */
        #output_canvas {
            position: absolute; left: 0; top: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none;
        }
        
        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .progress-bar-bg { width: 70%; height: 8px; background: #1a1a1a; border-radius: 4px; margin-top: 20px; }
        #progress-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s; }
        
        #error-console {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.5); color: #fff; padding: 10px;
            font-size: 12px; z-index: 2000; display: none; border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="loader" class="loader-container">
        <div style="letter-spacing: 3px; font-weight: bold;">SISTEMA CYBER SENTINEL</div>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <div id="status-text" style="margin-top:10px; font-size: 12px;">INICIALIZANDO...</div>
    </div>

    <div id="error-console"></div>

    <!-- La cámara se muestra aquí -->
    <video id="video_input" playsinline></video>
    <!-- Los objetos 3D se muestran aquí -->
    <canvas id="output_canvas"></canvas>

    <script>
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const loader = document.getElementById('loader');
        const errorConsole = document.getElementById('error-console');

        function showError(msg) {
            errorConsole.style.display = 'block';
            errorConsole.innerHTML += `> ${msg}<br>`;
        }

        // --- Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('output_canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        scene.add(new THREE.AmbientLight(0xffffff, 2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 1, 1);
        scene.add(dirLight);

        let model;
        const manager = new THREE.LoadingManager();
        manager.onProgress = (u, l, t) => {
            const p = (l/t) * 100;
            progressFill.style.width = p + '%';
            statusText.innerText = `DESCARGANDO MODELO: ${Math.round(p)}%`;
        };

        const loader3d = new THREE.GLTFLoader(manager);
        loader3d.load('Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb', (gltf) => {
            model = gltf.scene;
            model.scale.set(0.6, 0.6, 0.6);
            model.visible = false;
            scene.add(model);
            startAI();
        }, undefined, (e) => showError("Error Modelo: " + e.message));

        function startAI() {
            statusText.innerText = "INICIANDO CÁMARA E IA...";
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

            hands.onResults((results) => {
                loader.style.display = 'none'; // Quitar loader en el primer resultado
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const p = results.multiHandLandmarks[0][9]; // Centro de la palma
                    // Mapeo de coordenadas (MediaPipe 0:1 -> Three.js -5:5)
                    model.position.x = (p.x - 0.5) * -10; // Invertido por el espejo del video
                    model.position.y = (p.y - 0.5) * -10;
                    model.position.z = -p.z * 10;
                    model.rotation.y += 0.05;
                    model.visible = true;
                } else {
                    model.visible = false;
                }
                renderer.render(scene, camera);
            });

            const video = document.getElementById('video_input');
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720
            });
            cam.start().catch(err => showError("Cámara: " + err.message));
        }

        // Ajuste de pantalla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
