<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Sentinel - AR Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #output_canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: cover; }
        #video_input { display: none; }
        
        .loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffcc; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .progress-bar-bg { width: 70%; height: 10px; background: #1a1a1a; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s ease; }
        
        #error-console {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.4); border: 1px solid #ff4444;
            color: #ffffff; padding: 10px; font-size: 12px; z-index: 2000;
            display: none; max-height: 150px; overflow-y: auto;
        }
    </style>
</head>

<body>
    <div id="loader" class="loader-container">
        <h1 style="font-size: 1rem;">DIAGNÓSTICO CYBER SENTINEL</h1>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <div id="status-text" style="margin-top:10px;">Iniciando...</div>
    </div>

    <div id="error-console"></div>

    <video id="video_input" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const errorConsole = document.getElementById('error-console');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');

        function showError(msg) {
            errorConsole.style.display = 'block';
            errorConsole.innerHTML += `> ERROR: ${msg}<br>`;
            console.error(msg);
        }

        function logStatus(msg, percent) {
            statusText.innerText = msg + "...";
            if(percent !== undefined) progressFill.style.width = percent + '%';
        }

        // 1. Validar HTTPS
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            showError("LA CÁMARA REQUIERE HTTPS.");
        }

        // 2. Captura de Errores
        window.onerror = (msg, url, line) => showError(`${msg} (Línea ${line})`);

        // --- Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('output_canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff, 2));

        const manager = new THREE.LoadingManager();
        manager.onStart = () => logStatus("Descargando Modelo 3D (18MB)", 5);
        manager.onProgress = (u, l, t) => {
            const p = (l/t) * 90; // Ocupa hasta el 90%
            logStatus(`Descargando... ${Math.round(p)}%`, p);
        };
        manager.onError = (url) => showError(`Error de carga: ${url}`);

        const loader3d = new THREE.GLTFLoader(manager);
        loader3d.load('Meshy_AI_Cyber_Sentinel_Superi_0419122834_texture.glb', 
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.6, 0.6, 0.6);
                model.visible = false;
                scene.add(model);
                logStatus("Modelo Listo. Iniciando IA", 95);
                startAI(model);
            },
            undefined,
            (err) => showError("Error GLB: " + err.message)
        );

        function startAI(model) {
            try {
                const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
                
                hands.onResults((results) => {
                    document.getElementById('loader').style.display = 'none';
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const p = results.multiHandLandmarks[0][9];
                        model.position.set((p.x-0.5)*10, -(p.y-0.5)*10, -p.z*10);
                        model.rotation.y += 0.05;
                        model.visible = true;
                    } else { model.visible = false; }
                    renderer.render(scene, camera);
                });

                const cam = new Camera(document.getElementById('video_input'), {
                    onFrame: async () => { await hands.send({ image: document.getElementById('video_input') }); },
                    width: 1280, height: 720
                });
                cam.start().then(() => logStatus("Cámara OK", 100)).catch(err => showError("Cámara: " + err.message));
            } catch(e) { showError("IA: " + e.message); }
        }
    </script>
</body>
</html>
